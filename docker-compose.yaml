version: "3.9"

services:
  postgres:
    container_name: mara-db
    image: postgres:16-alpine 
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - mara_data:/var/lib/postgresql/data

volumes:
  mara_data:
